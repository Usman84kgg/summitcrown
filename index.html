<!DOCTYPE html>
<html>
<head>
<title>Summit Crown</title>

<style>
body{
background:#000;
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
text-align:center;
}

input{
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
width:250px;
}

button{
padding:12px 20px;
margin-top:15px;
border:none;
border-radius:10px;
cursor:pointer;
}

#site{
display:none;
text-align:center;
}
</style>

</head>

<body>

<div class="login-box" id="login">

<h1>SUMMIT CROWN</h1>
<p>Private Community Access</p>

<input type="password" id="password"
placeholder="Enter Password">

<br>

<button onclick="checkPassword()">
Login
</button>

</div>


<div id="site">

<h1>Welcome to Summit Crown</h1>

<p>Access Granted.</p>

</div>


<script>

function checkPassword(){

var password =
document.getElementById("password").value;

if(password === "summit2026"){

document.getElementById("login").style.display="none";
document.getElementById("site").style.display="block";

}else{

alert("Wrong password");

}

}

</script>

</body>
</html>
